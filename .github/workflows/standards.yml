# Standards Invariants — permanent CI gate
#
# Runs scripts/verify-standards.js on every push to main and on every PR.
# Also runs scripts/verify-cascade.js as a secondary check.
#
# Both scripts must exit 0 for the workflow to pass. If a PR touches any
# .md file in upload/ or scripts/verify-*.js, this workflow is the last
# line of defense before the change lands on main.
#
# Maintenance protocol:
#   When you intentionally change a standard's invariant, update the
#   corresponding V## check in scripts/verify-standards.js BEFORE merging.
#   Never disable this workflow as a workaround.

name: Standards Invariants

on:
  push:
    branches: [main, master]
    paths:
      - 'upload/**'
      - 'scripts/verify-*.js'
      - '.github/workflows/standards.yml'
  pull_request:
    paths:
      - 'upload/**'
      - 'scripts/verify-*.js'
      - '.github/workflows/standards.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: standards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (V01-V10 + cascade)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Run verify-standards.js (V01-V10)
        working-directory: ${{ github.workspace }}
        run: |
          echo "::group::Permanent standards verifier"
          node scripts/verify-standards.js
          echo "::endgroup::"

      - name: Run verify-cascade.js (L1-L5, 47 checks)
        working-directory: ${{ github.workspace }}
        run: |
          echo "::group::Cascade integration verifier"
          node scripts/verify-cascade.js
          echo "::endgroup::"

      - name: Summary
        if: always()
        run: |
          echo "## Standards Invariants" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "All 57 checks passed (10 permanent + 47 cascade)." >> $GITHUB_STEP_SUMMARY
          else
            echo "One or more invariant checks FAILED. See logs above." >> $GITHUB_STEP_SUMMARY
            echo "See maintenance protocol in scripts/verify-standards.js header." >> $GITHUB_STEP_SUMMARY
          fi
